<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lintelos Website Header</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ===== DESIGN TOKENS (v2) ===== */
        :root {
            /* Core brand (preserved) */
            --ivory: #f5f3ee;
            --copper: #d98238;
            --pale-olive: #cadba9;
            --avocado: #a1ba56;
            --army: #717a2c;

            /* Refined earth palette */
            --paper: #f5f3ee;
            --paper-deep: #ece8df;
            --ink: #1c1d17;
            --ink-soft: #45473a;
            --muted: #6f7163;
            --line: #ddd8cb;
            --sun: #e2873a;
            --forest: #3a3f22;
            --white: #ffffff;

            /* Type */
            --font-display: 'Funnel Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        }

        /* ===== HEADER COMPONENT ===== */
        .lintelos-header {
            background: rgba(245, 243, 238, 0.85);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
            padding: 1.1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            font-family: var(--font-body);
            transition: border-color 0.3s ease, padding 0.3s ease, background 0.3s ease;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo Section */
        .header-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .header-logo:hover {
            opacity: 0.85;
        }

        .header-logo:focus-visible {
            outline: 2px solid var(--army);
            outline-offset: 4px;
            border-radius: 4px;
        }

        .header-logo-image {
            height: 52px;
            width: auto;
            display: block;
        }

        /* Navigation Section */
        .header-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-list {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            color: var(--ink-soft);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            transition: color 0.25s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            position: relative;
        }

        /* Animated underline */
        .nav-link::before {
            content: '';
            position: absolute;
            left: 0.9rem;
            right: 0.9rem;
            bottom: 0.35rem;
            height: 1.5px;
            background: var(--army);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.28s ease;
        }

        .nav-link:hover {
            color: var(--army);
        }

        .nav-link:hover::before {
            transform: scaleX(1);
        }

        .nav-link:focus-visible {
            outline: 2px solid var(--army);
            outline-offset: 2px;
            color: var(--army);
        }

        /* Dropdown Functionality */
        .nav-item.has-dropdown .nav-link::after {
            content: '▾';
            font-size: 0.7rem;
            color: var(--muted);
            transition: transform 0.3s ease;
        }

        .nav-item.has-dropdown:hover .nav-link::after,
        .nav-item.has-dropdown.dropdown-open .nav-link::after {
            transform: rotate(180deg);
            color: var(--army);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 0.6rem);
            left: 0;
            background: var(--white);
            border: 1px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 16px 40px rgba(28, 29, 23, 0.12);
            padding: 0.5rem 0;
            min-width: 230px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .nav-item.has-dropdown:hover .dropdown-menu,
        .nav-item.has-dropdown.dropdown-open .dropdown-menu,
        .dropdown-menu:hover {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: block;
            color: var(--ink-soft);
            text-decoration: none;
            padding: 0.7rem 1.4rem;
            font-size: 0.92rem;
            transition: all 0.25s ease;
            margin: 0 0.4rem;
            border-radius: 6px;
        }

        .dropdown-item:hover {
            background: var(--paper-deep);
            color: var(--army);
        }

        .dropdown-item:focus-visible {
            outline: 2px solid var(--army);
            outline-offset: 2px;
            background: var(--paper-deep);
            color: var(--army);
        }

        /* Header CTA */
        .nav-cta {
            margin-left: 0.5rem;
            background: var(--army);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            padding: 0.65rem 1.3rem;
            border-radius: 7px;
            text-decoration: none;
            transition: background 0.25s ease, transform 0.25s ease;
        }

        .nav-cta::before { display: none; }

        .nav-cta:hover {
            background: var(--forest);
            color: var(--white);
            transform: translateY(-1px);
        }

        .nav-cta:focus-visible {
            outline: 2px solid var(--army);
            outline-offset: 2px;
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.3s ease;
            color: var(--ink);
        }

        .mobile-menu-toggle:hover {
            background: var(--paper-deep);
            color: var(--army);
        }

        .mobile-menu-toggle:focus-visible {
            outline: 2px solid var(--army);
            outline-offset: 2px;
        }

        .hamburger {
            width: 24px;
            height: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hamburger span {
            display: block;
            height: 2px;
            width: 100%;
            background: currentColor;
            border-radius: 1px;
            transition: all 0.3s ease;
        }

        .mobile-menu-open .hamburger span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .mobile-menu-open .hamburger span:nth-child(2) {
            opacity: 0;
        }

        .mobile-menu-open .hamburger span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 968px) {
            .header-container {
                padding: 0 1.5rem;
            }

            .mobile-menu-toggle {
                display: block;
            }

            .header-nav {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--paper);
                border-top: 1px solid var(--line);
                box-shadow: 0 16px 40px rgba(28, 29, 23, 0.12);
                padding: 1.25rem 0;
                opacity: 0;
                visibility: hidden;
                transform: translateY(-10px);
                transition: all 0.3s ease;
            }

            .mobile-menu-open .header-nav {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }

            .nav-list {
                flex-direction: column;
                gap: 0;
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 2rem;
                align-items: stretch;
            }

            .nav-item {
                width: 100%;
                border-bottom: 1px solid var(--line);
            }

            .nav-item:last-child {
                border-bottom: none;
            }

            .nav-link {
                width: 100%;
                padding: 1rem 0;
                justify-content: space-between;
            }

            .nav-link::before { display: none; }

            .nav-cta {
                margin: 1rem 0 0 0;
                text-align: center;
                justify-content: center;
            }

            /* Mobile dropdown */
            .dropdown-menu {
                position: static;
                box-shadow: none;
                border: none;
                border-top: 1px solid var(--line);
                border-radius: 0;
                transform: none;
                opacity: 1;
                visibility: visible;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease, padding 0.3s ease;
                padding: 0;
                background: var(--paper-deep);
            }

            .nav-item.has-dropdown.dropdown-open .dropdown-menu {
                max-height: 200px;
                padding: 0.5rem 0;
            }

            .dropdown-item {
                padding: 0.75rem 2rem;
                margin: 0;
                border-radius: 0;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                padding: 0 1rem;
            }

            .header-logo-image {
                height: 46px;
            }

            .nav-list {
                padding: 0 1rem;
            }
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-contrast: high) {
            .nav-link { color: var(--ink); }
            .nav-link:hover, .nav-link:focus { color: var(--army); }
            .dropdown-item { color: var(--ink); }
        }

        @media (prefers-reduced-motion: reduce) {
            .nav-link, .nav-link::before, .dropdown-menu, .header-logo,
            .mobile-menu-toggle, .hamburger span, .nav-cta {
                transition: none;
            }
        }

        .nav-link:focus:not(:focus-visible),
        .dropdown-item:focus:not(:focus-visible),
        .header-logo:focus:not(:focus-visible),
        .mobile-menu-toggle:focus:not(:focus-visible) {
            outline: none;
        }

        .lintelos-header.sticky {
            padding: 0.85rem 0;
            border-bottom-color: var(--copper);
        }
    </style>
</head>
<body>
    <header class="lintelos-header" role="banner">
        <div class="header-container">
            <!-- Logo -->
            <a href="/" class="header-logo" aria-label="Lintelos homepage">
                <img src="https://cdn.prod.website-files.com/68894805ea53059625ffd3f8/68894d1b2e789cad27ab846d_archthropica_typemark-logo-fullcolor.png"
                     alt="Lintelos logo"
                     class="header-logo-image"
                     loading="lazy"
                     decoding="async">
            </a>

            <!-- Mobile Menu Toggle -->
            <button class="mobile-menu-toggle"
                    aria-label="Toggle navigation menu"
                    aria-expanded="false"
                    type="button">
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </button>

            <!-- Navigation -->
            <nav class="header-nav" role="navigation" aria-label="Main navigation">
                <ul class="nav-list">
                    <!-- HIDDEN: Products with Dropdown
                    <li class="nav-item has-dropdown">
                        <a href="/products"
                           class="nav-link"
                           aria-haspopup="true"
                           aria-expanded="false"
                           aria-label="Products menu">
                            Products
                        </a>
                        <div class="dropdown-menu" role="menu">
                            <a href="/products/revit-add-ins"
                               class="dropdown-item"
                               role="menuitem"
                               aria-label="View Revit Add-ins">
                                Archi-Flow Revit Add-ins
                            </a>
                        </div>
                    </li>
                    -->

                    <!-- Consulting -->
                    <li class="nav-item">
                        <a href="/consulting"
                           class="nav-link"
                           aria-label="View consulting services">
                            Consulting
                        </a>
                    </li>

                    <!-- HIDDEN: ROI Calculator
                    <li class="nav-item">
                        <a href="https://www.lintelos.com/roi-calculator"
                           class="nav-link"
                           aria-label="Calculate your ROI">
                            ROI Calculator
                        </a>
                    </li>
                    -->

                    <!-- About -->
                    <li class="nav-item">
                        <a href="/about"
                           class="nav-link"
                           aria-label="Learn about Lintelos">
                            About
                        </a>
                    </li>

                    <!-- Contact -->
                    <li class="nav-item">
                        <a href="/contact"
                           class="nav-link"
                           aria-label="Contact us">
                            Contact
                        </a>
                    </li>

                    <!-- Header CTA -->
                    <li class="nav-item">
                        <a href="/contact"
                           class="nav-cta"
                           aria-label="Get started with Lintelos">
                            Get Started
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <script>
        // Header functionality
        document.addEventListener('DOMContentLoaded', function() {
            const header = document.querySelector('.lintelos-header');
            const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
            const dropdownItems = document.querySelectorAll('.nav-item.has-dropdown');
            const navLinks = document.querySelectorAll('.nav-link');
            const dropdownLinks = document.querySelectorAll('.dropdown-item');

            // Mobile menu toggle functionality
            mobileMenuToggle.addEventListener('click', function() {
                const isOpen = header.classList.contains('mobile-menu-open');

                if (isOpen) {
                    header.classList.remove('mobile-menu-open');
                    this.setAttribute('aria-expanded', 'false');
                } else {
                    header.classList.add('mobile-menu-open');
                    this.setAttribute('aria-expanded', 'true');
                }
            });

            // Dropdown functionality for desktop
            dropdownItems.forEach(item => {
                const link = item.querySelector('.nav-link');
                const dropdown = item.querySelector('.dropdown-menu');
                let hoverTimeout;

                item.addEventListener('mouseenter', function() {
                    clearTimeout(hoverTimeout);
                    this.classList.add('dropdown-open');
                    link.setAttribute('aria-expanded', 'true');
                });

                item.addEventListener('mouseleave', function() {
                    hoverTimeout = setTimeout(() => {
                        this.classList.remove('dropdown-open');
                        link.setAttribute('aria-expanded', 'false');
                    }, 150);
                });

                link.addEventListener('click', function(e) {
                    if (window.innerWidth <= 968) {
                        e.preventDefault();
                        const isOpen = item.classList.contains('dropdown-open');

                        dropdownItems.forEach(otherItem => {
                            if (otherItem !== item) {
                                otherItem.classList.remove('dropdown-open');
                                otherItem.querySelector('.nav-link').setAttribute('aria-expanded', 'false');
                            }
                        });

                        if (isOpen) {
                            item.classList.remove('dropdown-open');
                            this.setAttribute('aria-expanded', 'false');
                        } else {
                            item.classList.add('dropdown-open');
                            this.setAttribute('aria-expanded', 'true');
                        }
                    }
                });
            });

            // Close mobile menu when clicking nav links
            [...navLinks, ...dropdownLinks].forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 968 && !this.classList.contains('nav-link')) {
                        header.classList.remove('mobile-menu-open');
                        mobileMenuToggle.setAttribute('aria-expanded', 'false');
                    }
                });
            });

            // Close mobile menu when clicking outside
            document.addEventListener('click', function(e) {
                if (!header.contains(e.target) && header.classList.contains('mobile-menu-open')) {
                    header.classList.remove('mobile-menu-open');
                    mobileMenuToggle.setAttribute('aria-expanded', 'false');
                }
            });

            // Enhanced keyboard navigation
            navLinks.forEach((link, index) => {
                link.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        if (this.getAttribute('aria-haspopup') === 'true') {
                            e.preventDefault();
                            const dropdown = this.parentNode;
                            const isOpen = dropdown.classList.contains('dropdown-open');

                            if (isOpen) {
                                dropdown.classList.remove('dropdown-open');
                                this.setAttribute('aria-expanded', 'false');
                            } else {
                                dropdown.classList.add('dropdown-open');
                                this.setAttribute('aria-expanded', 'true');
                                const firstDropdownItem = dropdown.querySelector('.dropdown-item');
                                if (firstDropdownItem) {
                                    setTimeout(() => firstDropdownItem.focus(), 100);
                                }
                            }
                        }
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        const nextLink = navLinks[index + 1];
                        if (nextLink) {
                            nextLink.focus();
                        }
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        const prevLink = navLinks[index - 1];
                        if (prevLink) {
                            prevLink.focus();
                        }
                    } else if (e.key === 'Escape') {
                        const dropdown = this.closest('.has-dropdown');
                        if (dropdown && dropdown.classList.contains('dropdown-open')) {
                            dropdown.classList.remove('dropdown-open');
                            this.setAttribute('aria-expanded', 'false');
                            this.focus();
                        }
                    }
                });
            });

            // Keyboard navigation for dropdown items
            dropdownLinks.forEach((link, index, array) => {
                link.addEventListener('keydown', function(e) {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        const nextItem = array[index + 1];
                        if (nextItem) {
                            nextItem.focus();
                        }
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        const prevItem = array[index - 1];
                        if (prevItem) {
                            prevItem.focus();
                        } else {
                            const mainLink = this.closest('.has-dropdown').querySelector('.nav-link');
                            mainLink.focus();
                        }
                    } else if (e.key === 'Escape') {
                        const dropdown = this.closest('.has-dropdown');
                        const mainLink = dropdown.querySelector('.nav-link');
                        dropdown.classList.remove('dropdown-open');
                        mainLink.setAttribute('aria-expanded', 'false');
                        mainLink.focus();
                    }
                });
            });

            // Handle window resize
            window.addEventListener('resize', function() {
                if (window.innerWidth > 968) {
                    header.classList.remove('mobile-menu-open');
                    mobileMenuToggle.setAttribute('aria-expanded', 'false');

                    dropdownItems.forEach(item => {
                        item.classList.remove('dropdown-open');
                        item.querySelector('.nav-link').setAttribute('aria-expanded', 'false');
                    });
                }
            });

            // Sticky header scroll effect
            window.addEventListener('scroll', function() {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                if (scrollTop > 60) {
                    header.classList.add('sticky');
                } else {
                    header.classList.remove('sticky');
                }
            });
        });
    </script>
</body>
</html>
