<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lintelos Footer Component</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ===== DESIGN TOKENS (v2) ===== */
        :root {
            --ivory: #f5f3ee;
            --copper: #d98238;
            --pale-olive: #cadba9;
            --avocado: #a1ba56;
            --army: #717a2c;
            --paper: #f5f3ee;
            --paper-deep: #ece8df;
            --ink: #1c1d17;
            --ink-soft: #45473a;
            --muted: #6f7163;
            --line: #ddd8cb;
            --sun: #e2873a;
            --forest: #3a3f22;
            --white: #ffffff;
            --font-display: 'Funnel Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        }

        /* ===== FOOTER COMPONENT ===== */
        .lintelos-footer {
            background: var(--paper-deep);
            color: var(--ink-soft);
            padding: 4rem 0 1.75rem 0;
            margin: 0;
            font-family: var(--font-body);
            line-height: 1.6;
            border-top: 1px solid var(--line);
            position: relative;
        }

        /* Thin brand accent rule along the top */
        .lintelos-footer::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            width: 120px;
            height: 3px;
            background: var(--copper);
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .footer-content {
            display: grid;
            grid-template-columns: 1.4fr repeat(3, 1fr);
            gap: 3rem;
            align-items: start;
            margin-bottom: 3rem;
        }

        /* Logo + tagline */
        .footer-logo {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .footer-logo-image {
            width: 210px;
            height: auto;
            transition: opacity 0.3s ease;
        }

        .footer-logo-image:hover {
            opacity: 0.8;
        }

        .footer-tagline {
            margin-top: 1.25rem;
            font-size: 0.92rem;
            line-height: 1.6;
            color: var(--muted);
            max-width: 280px;
        }

        /* Navigation Columns */
        .footer-nav-column {
            display: flex;
            flex-direction: column;
        }

        .footer-nav-header {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--army);
            margin-bottom: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            line-height: 1.3;
        }

        .footer-nav-links {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .footer-nav-links li {
            margin-bottom: 0.8rem;
        }

        .footer-nav-links a {
            color: var(--ink-soft);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.25s ease, padding-left 0.25s ease;
            position: relative;
        }

        .footer-nav-links a:hover {
            color: var(--army);
            padding-left: 0.35rem;
        }

        .footer-nav-links a:focus-visible {
            outline: 2px solid var(--army);
            outline-offset: 2px;
            border-radius: 2px;
        }

        /* Footer Bottom */
        .footer-bottom {
            border-top: 1px solid var(--line);
            padding-top: 1.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-copyright {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .footer-mark {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 968px) {
            .footer-content {
                grid-template-columns: 1fr 1fr;
                gap: 2.5rem;
            }

            .footer-logo {
                grid-column: 1 / -1;
                margin-bottom: 0.5rem;
            }

            .footer-tagline {
                max-width: 420px;
            }
        }

        @media (max-width: 768px) {
            .footer-container {
                padding: 0 1rem;
            }

            .lintelos-footer {
                padding: 3rem 0 1.5rem 0;
            }

            .footer-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .footer-logo-image { width: 180px; }
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-contrast: high) {
            .footer-nav-links a { color: var(--ink); }
            .footer-nav-links a:hover { color: var(--army); }
        }

        @media (prefers-reduced-motion: reduce) {
            .footer-nav-links a, .footer-logo-image {
                transition: none;
            }
            .footer-nav-links a:hover { padding-left: 0; }
        }

        .footer-nav-links a:focus:not(:focus-visible) {
            outline: none;
        }
    </style>
</head>
<body>
    <footer class="lintelos-footer" role="contentinfo">
        <div class="footer-container">
            <div class="footer-content">
                <!-- Logo + tagline -->
                <div class="footer-logo">
                    <img src="https://cdn.prod.website-files.com/68894805ea53059625ffd3f8/68896ab66c08faa79f526253_archthropica_typemark-logo-black.png"
                         alt="Lintelos logo"
                         class="footer-logo-image"
                         loading="lazy"
                         decoding="async">
                    <p class="footer-tagline">Intelligent automation for architecture firms. We automate the repetitive, so your team can focus on great design.</p>
                </div>

                <!-- Menu Navigation -->
                <nav class="footer-nav-column" aria-label="Main navigation">
                    <h3 class="footer-nav-header">Menu</h3>
                    <ul class="footer-nav-links">
                        <li><a href="/" aria-label="Go to homepage">Home</a></li>
                        <li><a href="/about" aria-label="Learn about Lintelos">About</a></li>
                        <li><a href="/consulting" aria-label="View consulting services">Consulting</a></li>
                        <!-- <li><a href="/products" aria-label="Browse our products">Products</a></li> -->
                    </ul>
                </nav>

                <!-- COMMENTED OUT: Products Navigation -->
                <!--
                <nav class="footer-nav-column" aria-label="Products navigation">
                    <h3 class="footer-nav-header">Products</h3>
                    <ul class="footer-nav-links">
                        <li><a href="/products/revit-add-ins" aria-label="View Revit Add-Ins">Archi-Flow Revit Add-Ins</a></li>
                    </ul>
                </nav>
                -->

                <!-- Help Navigation -->
                <nav class="footer-nav-column" aria-label="Help navigation">
                    <h3 class="footer-nav-header">Help</h3>
                    <ul class="footer-nav-links">
                        <li><a href="/contact" aria-label="Contact support">Contact</a></li>
                        <!-- COMMENTED OUT: Customer Login Link -->
                        <!-- <li><a href="https://billing.stripe.com/p/login/test_8x29AN2A83L38g0dPj0ZW00" area-label="Customer login">Customer Login</a></li> -->
                    </ul>
                </nav>

                <!-- Legal Navigation -->
                <nav class="footer-nav-column" aria-label="Legal navigation">
                    <h3 class="footer-nav-header">Legal</h3>
                    <ul class="footer-nav-links">
                        <li><a href="/privacy-policy" aria-label="Read privacy policy">Privacy Policy</a></li>
                        <li><a href="/terms-of-service" aria-label="Read terms of service">Terms of Service</a></li>
                    </ul>
                </nav>
            </div>

            <!-- Footer Bottom -->
            <div class="footer-bottom">
                <div class="footer-copyright">
                    <p>&copy; <span id="current-year">2025</span> Lintelos. All rights reserved.</p>
                </div>
                <div class="footer-mark">We Automate. You Design.</div>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentYear = new Date().getFullYear();
            const yearElement = document.getElementById('current-year');
            if (yearElement) {
                yearElement.textContent = currentYear;
            }

            const footerLinks = document.querySelectorAll('.footer-nav-links a');
            footerLinks.forEach(link => {
                link.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });

            const anchorLinks = document.querySelectorAll('a[href^="#"]');
            anchorLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
